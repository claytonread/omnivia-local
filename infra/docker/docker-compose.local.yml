services:
  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      OMNIVIA_MODE: local
      OMNIVIA_DB_PATH: /data/omnivia.sqlite
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ../../data:/data
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-server:
    build:
      context: ../..
      dockerfile: services/mcp_server/Dockerfile
    ports:
      - "8081:8081"
    environment:
      OMNIVIA_API_URL: http://api:8080
    depends_on:
      api:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "test -f /qdrant/storage/raft_state.json || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  qdrant_storage: